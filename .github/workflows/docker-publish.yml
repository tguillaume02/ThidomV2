name: Build & Publish Docker images

# Builds backend + frontend Docker images and publishes them to
# GitHub Container Registry (ghcr.io) on every push to master/main
# and on every version tag (v*.*.*).
#
# End users only need to run `./update.sh` (or `update.ps1`) on their
# server to pull the freshly built images and restart the stack.

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image names are derived from the repository name and forced to lowercase
  # (GHCR requires lowercase). Final names will look like:
  #   ghcr.io/<owner>/thidomv2-backend
  #   ghcr.io/<owner>/thidomv2-frontend
  IMAGE_BACKEND: ${{ github.repository_owner }}/thidomv2-backend
  IMAGE_FRONTEND: ${{ github.repository_owner }}/thidomv2-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            image_var: IMAGE_BACKEND
          - name: frontend
            context: ./frontend
            image_var: IMAGE_FRONTEND

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: img
        run: |
          NAME="${{ env[matrix.image_var] }}"
          echo "name=${NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') || github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build & push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
