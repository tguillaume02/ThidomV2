name: Build & Publish release artifacts (no Docker)

# Build le frontend Angular et package le backend Python en archives ZIP,
# puis publie le tout dans une GitHub Release.
#
# Triggers :
#   - push sur master/main  -> release "rolling" `latest-master` (prerelease)
#   - tag v*.*.*           -> release stable avec le tag
#
# L'utilisateur final telecharge l'archive via update-no-docker.sh / .ps1
# et la deploie sur Apache + venv Python — sans Docker, sans Node, sans npm.

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------- Alert-App (Windows .exe) ----------
  build-alert-app:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if alert-app changed
        id: check
        shell: pwsh
        run: |
          $diff = git diff --name-only HEAD~1 HEAD 2>$null
          if (-not $diff) { $diff = git diff --name-only HEAD }
          $changed = $diff | Where-Object { $_ -like "alert-app/*" }
          if ($changed) { echo "changed=true" >> $env:GITHUB_OUTPUT } else { echo "changed=false" >> $env:GITHUB_OUTPUT }

      - name: Setup Python
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies & build exe
        if: steps.check.outputs.changed == 'true'
        working-directory: alert-app
        run: |
          pip install -r requirements.txt
          pyinstaller --onefile --noconsole --name ThiDomAlert main.py

      - name: Upload alert-app artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ThiDomAlert-exe
          path: alert-app/dist/ThiDomAlert.exe

  build-and-release:
    runs-on: ubuntu-latest
    needs: build-alert-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Frontend (Angular) ----------
      - name: Download alert-app artifact
        uses: actions/download-artifact@v4
        with:
          name: ThiDomAlert-exe
          path: alert-app-dist
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Package frontend dist
        run: |
          cd frontend/dist/thidom
          zip -r "$GITHUB_WORKSPACE/frontend-dist.zip" browser
          cd "$GITHUB_WORKSPACE"
          # Inclure aussi la config Apache prete a l'emploi
          zip -j frontend-dist.zip frontend/apache.conf

      # ---------- Backend (Python — pas de compilation) ----------
      - name: Package backend sources
        run: |
          zip -r backend.zip backend \
            -x 'backend/venv/*' \
               'backend/__pycache__/*' \
               'backend/**/__pycache__/*' \
               'backend/*.db' \
               'backend/.env'

      # ---------- Archive combinee ----------
      - name: Create combined release archive
        run: |
          mkdir -p release/thidom
          cp -r frontend/dist/thidom/browser release/thidom/frontend
          cp frontend/apache.conf            release/thidom/apache.conf
          rsync -a --exclude 'venv' \
                   --exclude '__pycache__' \
                   --exclude '*.db' \
                   --exclude '.env' \
                   backend release/thidom/
          cp backend/requirements.txt release/thidom/requirements.txt
          # Include deployment scripts so the update can self-update
          cp update-no-docker.sh release/thidom/update-no-docker.sh
          cp install.sh          release/thidom/install.sh 2>/dev/null || true
          # Include alert-app exe if built
          if [ -f alert-app-dist/ThiDomAlert.exe ]; then
            cp alert-app-dist/ThiDomAlert.exe release/thidom/ThiDomAlert.exe
          fi
          # Manifest avec metadata du build
          cat > release/thidom/MANIFEST.txt <<EOF
          ThiDomV2 release
          ref:    ${{ github.ref }}
          sha:    ${{ github.sha }}
          built:  $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          cd release
          zip -r ../thidom-release.zip thidom

      # ---------- Publication via gh CLI (plus verbeux et debugable) ----------
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ls -la *.zip

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            NAME="ThiDomV2 ${TAG}"
            FLAGS="--latest"
          else
            TAG="latest-master"
            NAME="ThiDomV2 (rolling master)"
            FLAGS="--prerelease"
            echo "Suppression de l'ancienne release rolling (si elle existe)..."
            gh release delete "$TAG" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
          fi

          echo "Creation de la release '$TAG'..."
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$NAME" \
            --notes "Build automatique depuis ${GITHUB_REF} (${GITHUB_SHA::7})" \
            $FLAGS \
            thidom-release.zip frontend-dist.zip backend.zip

          # Upload alert-app exe separately if available
          if [ -f alert-app-dist/ThiDomAlert.exe ]; then
            gh release upload "$TAG" alert-app-dist/ThiDomAlert.exe --repo "$GITHUB_REPOSITORY" --clobber
          fi

          echo "Release publiee :"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY"

