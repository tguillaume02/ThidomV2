version: "3.8"

services:
  backend:
    build: ./backend
    container_name: thidom-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - thidom-data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/thidom.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: thidom-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/ssl:/usr/local/apache2/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: InfluxDB for time-series history
  # influxdb:
  #   image: influxdb:2.7
  #   container_name: thidom-influxdb
  #   ports:
  #     - "8086:8086"
  #   volumes:
  #     - influxdb-data:/var/lib/influxdb2
  #   environment:
  #     - DOCKER_INFLUXDB_INIT_MODE=setup
  #     - DOCKER_INFLUXDB_INIT_USERNAME=thidom
  #     - DOCKER_INFLUXDB_INIT_PASSWORD=thidom-password
  #     - DOCKER_INFLUXDB_INIT_ORG=thidom
  #     - DOCKER_INFLUXDB_INIT_BUCKET=thidom_history
  #     - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=thidom-influx-token

volumes:
  thidom-data:
