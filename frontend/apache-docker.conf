# Docker Apache config -- used inside the httpd:alpine container.
# For bare-metal, use apache.conf instead.

ServerName _

<VirtualHost *:80>
    # Static files served under /ThiDomV2/
    Alias /ThiDomV2 /usr/local/apache2/htdocs/browser

    <Directory /usr/local/apache2/htdocs/browser>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /ThiDomV2/
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /ThiDomV2/index.html [L]
    </Directory>

    # Redirect root to /ThiDomV2/
    RedirectMatch ^/$ /ThiDomV2/

    # WebSocket proxy: /ThiDomV2/api/ws/* -> backend /api/ws/*
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ThiDomV2/api/ws/(.*) ws://backend:8000/api/ws/$1 [P,L]

    # API reverse proxy: /ThiDomV2/api/* -> backend /api/*
    ProxyPreserveHost On
    ProxyPass        /ThiDomV2/api/ http://backend:8000/api/
    ProxyPassReverse /ThiDomV2/api/ http://backend:8000/api/
</VirtualHost>
