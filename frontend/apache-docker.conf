# Docker Apache config — used inside the httpd:alpine container.
# For bare-metal, use apache.conf instead.

ServerName localhost

<VirtualHost *:80>
    DocumentRoot /usr/local/apache2/htdocs

    <Directory /usr/local/apache2/htdocs>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # WebSocket proxy
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/api/ws/(.*) ws://backend:8000/api/ws/$1 [P,L]

    # API reverse proxy
    ProxyPreserveHost On
    ProxyPass        /api/ http://backend:8000/api/
    ProxyPassReverse /api/ http://backend:8000/api/
</VirtualHost>
