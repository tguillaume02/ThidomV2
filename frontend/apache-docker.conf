# Docker Apache config -- used inside the httpd:alpine container.
# For bare-metal, use apache.conf instead.

ServerName _

<VirtualHost *:80>
    # Static files served under /ThiDomV2/
    Alias /ThiDom /usr/local/apache2/htdocs/browser

    <Directory /usr/local/apache2/htdocs/browser>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /ThiDom/
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /ThiDom/index.html [L]
    </Directory>

    # Redirect root to /ThiDom/
    RedirectMatch ^/$ /ThiDom/

    # WebSocket proxy: /ThiDom/api/ws/* -> backend /api/ws/*
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ThiDom/api/ws/(.*) ws://backend:8000/api/ws/$1 [P,L]

    # API reverse proxy: /ThiDom/api/* -> backend /api/*
    ProxyPreserveHost On
    ProxyPass        /ThiDom/api/ http://backend:8000/api/
    ProxyPassReverse /ThiDom/api/ http://backend:8000/api/
</VirtualHost>
