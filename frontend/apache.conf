# =============================================================================
# ThiDomV2 — Configuration Apache (a inclure dans le VirtualHost existant)
#
# Ce fichier ne cree PAS de VirtualHost. Il s'ajoute au site existant
# pour coexister avec d'autres applications sur le meme port 80/443.
#
# Installation :
#   sudo cp apache.conf /etc/apache2/conf-available/ThiDomV2.conf
#   sudo a2enconf ThiDomV2
#   sudo apachectl configtest && sudo systemctl reload apache2
#
# Modules requis :
#   sudo a2enmod rewrite proxy proxy_http proxy_wstunnel headers
# =============================================================================

# --- Static files under /ThiDomV2/ ---
Alias /ThiDomV2 /var/www/ThiDomV2/browser

<Directory /var/www/ThiDomV2/browser>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Angular HTML5 routing
    RewriteEngine On
    RewriteBase /ThiDomV2/
    RewriteRule ^index\.html$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /ThiDomV2/index.html [L]
</Directory>

# --- WebSocket proxy: /ThiDomV2/api/ws/* -> backend ---
RewriteEngine On
RewriteCond %{HTTP:Upgrade} websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/ThiDomV2/api/ws/(.*) ws://localhost:8000/api/ws/$1 [P,L]

# --- API reverse proxy: /ThiDomV2/api/* -> backend ---
ProxyPreserveHost On
ProxyPass        /ThiDomV2/api/ http://localhost:8000/api/
ProxyPassReverse /ThiDomV2/api/ http://localhost:8000/api/
