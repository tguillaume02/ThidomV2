<VirtualHost *:80>
    ServerName localhost
    Redirect permanent / https://localhost/
</VirtualHost>

<VirtualHost *:443>
    ServerName localhost

    SSLEngine on
    SSLCertificateFile    /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile /etc/apache2/ssl/server.key

    DocumentRoot /var/www/thidomv2

    <Directory /var/www/thidomv2>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Angular HTML5 routing: rewrite all unknown paths to index.html
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # WebSocket proxy for real-time updates
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/api/ws/(.*) ws://localhost:8000/api/ws/$1 [P,L]

    # API reverse proxy
    ProxyPreserveHost On
    ProxyPass        /api/ http://localhost:8000/api/
    ProxyPassReverse /api/ http://localhost:8000/api/

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    ErrorLog  ${APACHE_LOG_DIR}/thidomv2_error.log
    CustomLog ${APACHE_LOG_DIR}/thidomv2_access.log combined
</VirtualHost>
