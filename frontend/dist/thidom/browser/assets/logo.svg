  <!-- House body outline -->
  <line x1="35" y1="90" x2="35" y2="160" stroke="#CCCCCC" stroke-width="2" opacity="0.4"/>
  <line x1="165" y1="90" x2="165" y2="160" stroke="#CCCCCC" stroke-width="2" opacity="0.4"/>
  <line x1="35" y1="160" x2="165" y2="160" stroke="#CCCCCC" stroke-width="2" opacity="0.4"/>
  <!-- Text ThiDom -->
