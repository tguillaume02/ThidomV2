<mat-sidenav-container class="layout-container">
  <!-- Sidebar -->
  <mat-sidenav
    [opened]="sidenavOpened"
    mode="side"
    class="sidebar">

    <div class="sidebar-header">
      <img src="assets/logo.svg" alt="ThiDom" class="logo" />
      <span class="app-title">ThiDom</span>
    </div>

    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.route) {
        <a mat-list-item
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="nav-item">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidebar-footer">
      <div class="ws-status">
        <span class="status-indicator" [class.online]="wsConnected" [class.offline]="!wsConnected"></span>
        <span class="status-text">{{ wsConnected ? 'Connecté' : 'Déconnecté' }}</span>
      </div>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="main-content">
    <!-- Top Toolbar -->
    <mat-toolbar class="top-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" matTooltip="Menu">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-spacer"></span>

      @if (authService.currentUser$ | async; as user) {
        <span class="user-name">{{ user.full_name || user.username }}</span>
      }

      <button mat-icon-button matTooltip="Notifications">
        <mat-icon matBadge="3" matBadgeColor="accent" matBadgeSize="small">notifications</mat-icon>
      </button>

      <button mat-icon-button matTooltip="Déconnexion" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Page Content -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
